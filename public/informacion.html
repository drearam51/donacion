<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Quiero informarme</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #141e30, #243b55);
            color: white;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            margin-bottom: 10px;
            font-size: clamp(1.5rem, 5vw, 2rem);
            line-height: 1.3;
        }

        p {
            margin-bottom: 30px;
            opacity: .9;
            font-size: clamp(0.95rem, 2.5vw, 1.05rem);
            line-height: 1.5;
        }

        .button {
            display: block;
            width: 100%;
            padding: 16px 20px;
            margin: 10px 0;
            border: none;
            border-radius: 30px;
            font-size: clamp(0.9rem, 2.5vw, 1rem);
            cursor: pointer;
            min-height: 48px;
        }

        .btn-primary {
            background: #e74c3c;
            color: white;
        }

        .btn-secondary {
            background: #3498db;
            color: white;
        }

        .btn-neutral {
            background: #7f8c8d;
            color: white;
        }

        #registroContainer input {
            box-sizing: border-box;
        }

        @media (max-width: 480px) {
            body {
                padding: 16px;
                align-items: flex-start;
                padding-top: max(20px, env(safe-area-inset-top));
                padding-bottom: max(20px, env(safe-area-inset-bottom));
            }

            .container {
                width: 100%;
            }

            .button {
                padding: 14px 16px;
                font-size: 0.95rem;
            }

            #registroContainer {
                margin-top: 20px !important;
                padding: 0 4px;
            }

            #registroContainer input {
                width: 100% !important;
                padding: 14px !important;
                font-size: 16px;
            }

            #registroContainer h2 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Donación de órganos</h1>

        <p>
            Una sola persona puede salvar hasta <b>8 vidas</b> mediante la donación de órganos.
            ¿Qué te gustaría hacer?
        </p>

        <button class="button btn-primary" onclick="mostrarFormulario()">
            Quiero informarme
        </button>

        <button class="button btn-secondary" onclick="registrarDecision('consultar_familia')">
            Quiero consultarlo con mi familia
        </button>

        <button class="button btn-neutral" onclick="registrarDecision('tal_vez_despues')">
            Tal vez después
        </button>

        <div id="registroContainer" style="display:none; margin-top:30px; padding: 0 8px; text-align:center; width:100%;">

            <h2>Registro</h2>

            <form id="registroForm">

                <input id="nombre" type="text" placeholder="Nombre completo" required
                    style="width:100%; padding:12px; margin:10px 0; border-radius:8px; border:none; font-size:16px; box-sizing:border-box;">

                <input id="email" type="email" placeholder="Correo electrónico" required
                    style="width:100%; padding:12px; margin:10px 0; border-radius:8px; border:none; font-size:16px; box-sizing:border-box;">

                <label style="display:block; margin-top:10px;">
                    <input type="checkbox" id="consentimiento" required>
                    Acepto el tratamiento de datos personales
                </label>

                <button type="submit" class="button btn-primary" style="margin-top:20px;">
                    Registrarme
                </button>

            </form>

            <div id="mensaje"></div>

        </div>
    </div>

    <script>

        async function registrarDecision(decision) {

            try {

                const data = {
                    decision: decision,
                    timestamp: new Date(),
                    userAgent: navigator.userAgent
                }

                await fetch('/api/interaction', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                })

                alert("Gracias por tu decisión ❤️")

            } catch (e) {
                console.error(e)
            }

            const params = new URLSearchParams(window.location.search);
            const historiaId = params.get("id");

            const payload = {
                historia_id: historiaId,
                decision: tipoDecision,
                timestamp: new Date().toISOString()
            };

            try {
                await fetch('/api/decision', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const container = document.getElementById("decisionContainer");

                if (tipoDecision === "registrarme") {

                    container.innerHTML = `
        <h3>Gracias por dar un paso que puede salvar vidas.</h3>
        <p>Te llevaremos al registro...</p>
        `;

                    setTimeout(() => {
                        window.location.href = "registro.html";
                    }, 1500);

                } else if (tipoDecision === "familia") {

                    container.innerHTML = `
        <h3>Hablarlo es un acto de responsabilidad.</h3>
        <p>Las decisiones importantes se toman en familia.</p>
        `;

                } else {

                    container.innerHTML = `
        <h3>Reflexionar también es un paso.</h3>
        <p>Cuando estés listo, la decisión puede salvar vidas.</p>
        `;
                }

            } catch (error) {
                console.error("Error guardando decisión:", error);
            }
        }

        function mostrarFormulario() {
            document.getElementById("registroContainer").style.display = "block";
        }

        const form = document.getElementById("registroForm");
        const mensaje = document.getElementById("mensaje");

        form.addEventListener("submit", async (e) => {

            e.preventDefault();

            const nombre = document.getElementById("nombre").value;
            const email = document.getElementById("email").value;
            const consentimiento = document.getElementById("consentimiento").checked;

            try {

                const response = await fetch("/api/register", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        nombre,
                        email,
                        consentimiento
                    })
                });

                const data = await response.json();

                if (data.success) {

                    mensaje.innerHTML = `
        <p style="color:#2ecc71; margin-top:20px;">
        ❤️ Gracias por registrarte.  
        Tu decisión puede cambiar vidas.
        </p>
      `;

                    form.reset();

                } else {

                    mensaje.innerHTML = `
        <p style="color:#e74c3c;">
        ${data.error}
        </p>
      `;

                }

            } catch (error) {

                mensaje.innerHTML = `
      <p style="color:#e74c3c;">
      Error de conexión con el servidor.
      </p>
    `;

            }

        });

    </script>

</body>

</html>
