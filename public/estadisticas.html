<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>Estadísticas</title>

<style>

* {
  box-sizing: border-box;
}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#141e30,#243b55);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  min-height:100dvh;
  padding:20px;
}

.container{
  width:100%;
  max-width:800px;
  text-align:center;
}

h1{
  margin-bottom:30px;
  font-size:clamp(1.4rem,4vw,2rem);
  line-height:1.3;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
}

.card{
  background:white;
  color:#2c3e50;
  padding:24px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,.3);
  min-height:100px;
}

.number{
  font-size:clamp(28px,6vw,40px);
  font-weight:bold;
  color:#e74c3c;
  display:block;
  margin-bottom:8px;
}

label{
  font-size:clamp(12px,2.5vw,14px);
}

button{
  margin-top:24px;
  padding:14px 28px;
  min-height:48px;
  border:none;
  border-radius:30px;
  background:#e74c3c;
  color:white;
  font-size:16px;
  cursor:pointer;
}

@media (max-width:600px){
  body{
    padding:16px;
    align-items:flex-start;
    padding-top:max(16px,env(safe-area-inset-top));
    padding-bottom:max(16px,env(safe-area-inset-bottom));
  }

  .grid{
    grid-template-columns:1fr;
    gap:16px;
  }

  .card{
    padding:20px;
  }

  .number{
    font-size:32px;
  }

  button{
    width:100%;
    margin-top:20px;
    padding:16px;
  }
}

@media (max-width:380px){
  .number{
    font-size:28px;
  }

  h1{
    font-size:1.25rem;
  }
}

</style>
</head>

<body>

<div class="container">

<h1>Impacto de la experiencia</h1>

<div class="grid">

<div class="card">
<div class="number" id="escaneos">0</div>
<label>Personas que escanearon</label>
</div>

<div class="card">
<div class="number" id="interesados">0</div>
<label>Quieren saber más</label>
</div>

<!-- <div class="card">
<div class="number" id="donantes">0</div>
<label>Quieren registrarse</label>
</div> -->

<div class="card">
<div class="number" id="vidas">0</div>
<label>Vidas que podrían salvarse</label>
</div>

</div>

<button onclick="window.location.href='mindar.html'">
Volver a la experiencia
</button>

</div>

<script>

async function cargarEstadisticas(){

  const res = await fetch('/api/stats')
  const data = await res.json()

  console.log("data", data)

  document.getElementById("escaneos").innerText = data.stats.totalInteractions ?? 0
  document.getElementById("interesados").innerText = data.stats.totalRegistrations ?? 0
  document.getElementById("vidas").innerText = (data.stats.totalRegistrations ?? 0) * 8

}

cargarEstadisticas()

</script>

</body>
</html>
