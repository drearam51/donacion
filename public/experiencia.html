#fadeOverlay{

  left:0;
  width:100%;
  height:100%;
  background:black;
  opacity:0;
  pointer-events:none;
  transition:opacity 1s ease;
  z-index:999;
}

#fadeOverlay.active{

let index = 0;
const scene = document.getElementById("scene");

// Pantalla inicial
scene.innerHTML = `
  <h2>Activa el sonido para vivir la experiencia completa</h2>
  <button class="primary" onclick="iniciar()">Comenzar</button>
`;
scene.classList.add("show");

function iniciar(){
  audio.play();
  scene.classList.remove("show");

  setTimeout(()=>mostrarEscena(),1000);
}

function mostrarEscena(){
  if(index < escenas.length){
    scene.innerHTML = `<h2>${escenas[index]}</h2>`;
    scene.classList.add("show");

    setTimeout(()=>{
      scene.classList.remove("show");
      index++;
      setTimeout(mostrarEscena,1000);
    },4000);

  } else {
    mostrarFinal();
  }
}

function mostrarFinal(){
  scene.innerHTML = `
    <h2>8 vidas pueden cambiar hoy.</h2>
    <div class="counter" id="contador">0</div>
    <button class="primary" onclick="irARegistro()">Quiero informarme</button>
    <button class="secondary" onclick="location.reload()">Aún no</button>
  `;
  scene.classList.add("show");
  animarContador();
}

function mostrarInformacion(){
  scene.innerHTML = `
    <h2>Mito:</h2>
    <p><strong>"Si soy donante, no harán todo por salvarme."</strong></p>
    <p style="opacity:0.8;">
      Realidad: Los médicos siempre priorizan salvar tu vida.
    </p>
    <button class="primary" onclick="mostrarFormulario()">Entiendo</button>
  `;
}

function irARegistro() {

  const overlay = document.getElementById("fadeOverlay");

  let vol = audio.volume;

  const fadeAudio = setInterval(() => {
    if (vol > 0.02) {
      vol -= 0.02;
      audio.volume = vol;
    } else {
      clearInterval(fadeAudio);
      audio.pause();
      audio.currentTime = 0;
    }
  }, 100);

  // Activar fade visual
  overlay.classList.add("active");

  // Redirigir después de animación
  setTimeout(() => {
    window.location.href = "registro.html";
  }, 1200);
}

function mostrarFormulario(){
  scene.innerHTML = `
    <h2>Déjanos tus datos</h2>

    <section id="registro-section" class="scene hidden">

      <div class="form-container">
        <h2>Da el siguiente paso</h2>
        <p>Regístrate para recibir información sobre cómo convertirte en donante.</p>

        <form id="registroForm">

          <input 
            type="text" 
            id="nombre" 
            placeholder="Nombre completo"
            required
          />

          <input 
            type="email" 
            id="email" 
            placeholder="Correo electrónico"
            required
          />

          <label class="checkbox-container">
            <input type="checkbox" id="consentimiento" required />
            Acepto la política de tratamiento de datos personales
          </label>

          <button type="submit" class="btn-primary">
            Registrarme
          </button>

        </form>

        <div id="mensaje"></div>

      </div>

    </section>
  `;

  document.getElementById("formRegistro")
    .addEventListener("submit", enviarFormulario);
}

async function enviarFormulario(e){
  e.preventDefault();

  const data = {
    nombre: document.getElementById("nombre").value,
    ciudad: document.getElementById("ciudad").value,
    edad: document.getElementById("edad").value,
    historiaID: historiaID,
    aceptoPolitica: document.getElementById("politica").checked
  };

  const response = await fetch("/register", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  });

  if(response.ok){
    scene.innerHTML = `
      <h2>Gracias por dar el siguiente paso.</h2>
      <p>Tu interés puede cambiar historias.</p>
    `;
  } else {
    alert("Error guardando datos");
  }
}

function animarContador(){
  let count = 0;
  const target = 8;
  const counter = document.getElementById("contador");

  const interval = setInterval(()=>{
    count++;
    counter.textContent = count;
    if(count >= target){
      clearInterval(interval);
    }
  },200);
}

const form = document.getElementById("registroForm");
const mensaje = document.getElementById("mensaje");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const nombre = document.getElementById("nombre").value;
  const email = document.getElementById("email").value;
  const consentimiento = document.getElementById("consentimiento").checked;

  try {
    const response = await fetch("/api/register", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        nombre,
        email,
        consentimiento
      })
    });

    const data = await response.json();

    if (data.success) {
      mensaje.innerHTML = `
        <p class="success">
          Gracias por registrarte. Tu decisión puede cambiar vidas.
        </p>
      `;
      form.reset();
    } else {
      mensaje.innerHTML = `
        <p class="error">${data.error}</p>
      `;
    }

  } catch (error) {
    mensaje.innerHTML = `
      <p class="error">Error de conexión con el servidor.</p>
    `;
  }
});
